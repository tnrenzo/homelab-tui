services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    command: >
      sh -c "/app/backend -addr 0.0.0.0 -port 8080 &
      /app/backend -addr 0.0.0.0 -port 8081 &
      wait"

  alpine-client:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: alpine-runtime
    stdin_open: true
    tty: true
    depends_on:
      - backend
    command: >
      -addr backend -port 8080

  debian-client:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: debian-runtime
    stdin_open: true
    tty: true
    depends_on:
      - backend
    command: >
      -addr backend -port 8081
